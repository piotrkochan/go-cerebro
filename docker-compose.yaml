services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      discovery.type: single-node
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - es-data:/usr/share/elasticsearch/data

  cerebro:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "9000:9000"
    environment:
      CEREBRO_PORT: "9000"
      APPLICATION_SECRET: "dev-secret-change-me"
      AUTH_TYPE: "disabled"
    volumes:
      - ./:/workspace/cerebro
    working_dir: /workspace/cerebro
    depends_on:
      elasticsearch:
        condition: service_healthy

volumes:
  es-data:
