services:
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      node.name: elasticsearch
      cluster.name: cerebro-dev
      discovery.seed_hosts: elasticsearch,elasticsearch-2
      cluster.initial_master_nodes: elasticsearch,elasticsearch-2
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    ports:
      - "9200:9200"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - es-data:/usr/share/elasticsearch/data

  elasticsearch-2:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.15.0
    environment:
      node.name: elasticsearch-2
      cluster.name: cerebro-dev
      discovery.seed_hosts: elasticsearch,elasticsearch-2
      cluster.initial_master_nodes: elasticsearch,elasticsearch-2
      xpack.security.enabled: "false"
      ES_JAVA_OPTS: "-Xms512m -Xmx512m"
    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:9200/_cluster/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 30
    volumes:
      - es-data-2:/usr/share/elasticsearch/data

  cerebro:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "9000:9000"
    environment:
      CEREBRO_PORT: "9000"
      APPLICATION_SECRET: "dev-secret-change-me"
      AUTH_TYPE: "disabled"
    volumes:
      - ./:/workspace/cerebro
    working_dir: /workspace/cerebro
    depends_on:
      elasticsearch:
        condition: service_healthy
      elasticsearch-2:
        condition: service_healthy

  frontend:
    image: node:26-alpine
    working_dir: /workspace/cerebro
    command: sh -c "npm ci && npm run dev -- --host 0.0.0.0"
    ports:
      - "5173:5173"
    environment:
      VITE_API_TARGET: "http://cerebro:9000"
    volumes:
      - ./:/workspace/cerebro
      - node-modules:/workspace/cerebro/node_modules
    depends_on:
      - cerebro

volumes:
  es-data:
  es-data-2:
  node-modules:
