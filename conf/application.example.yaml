# Cerebro example configuration. Copy to application.yaml and edit.

# A list of known hosts (Elasticsearch clusters). Each host can have its own auth
# and a whitelist of HTTP headers forwarded from the user's request to ES.
hosts:
  - name: "Local cluster"
    host: "http://localhost:9200"
    # auth:
    #   username: "elastic"
    #   password: "changeme"
    headers_whitelist: ["x-proxy-user", "x-proxy-roles", "X-Forwarded-For"]

# Application authentication. type: disabled | basic | ldap.
auth:
  # Set to "basic" or "ldap" before exposing Cerebro outside a trusted local network.
  type: "disabled"
  settings:
    # basic auth
    username: "${BASIC_AUTH_USER}"
    password: "${BASIC_AUTH_PWD}"
    # LDAP
    url: "${LDAP_URL}"
    base_dn: "${LDAP_BASE_DN}"
    method: "${LDAP_METHOD}"
    user_template: "${LDAP_USER_TEMPLATE}"
    bind_dn: "${LDAP_BIND_DN}"
    bind_pw: "${LDAP_BIND_PWD}"
    # LDAP requires ldaps:// by default. Set this only for isolated development tests.
    insecure_ldap: false
    group_search:
      base_dn: "${LDAP_GROUP_BASE_DN}"
      user_attr: "${LDAP_USER_ATTR}"
      user_attr_template: "${LDAP_USER_ATTR_TEMPLATE}"
      group: "${LDAP_GROUP}"

server:
  port: 9000
  base_path: "/"
  secret: "${APPLICATION_SECRET}"
  cookie_secure: true
  max_request_bytes: 5242880

es:
  gzip: true
  allow_ad_hoc_hosts: false
  max_response_bytes: 26214400

rest:
  history_size: 50

features:
  # Read-only browser for documents inside an index. Disabled by default because
  # it exposes document contents to every authenticated Cerebro user.
  data_explorer: false

data:
  path: "./cerebro.db"
