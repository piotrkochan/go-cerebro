# Go Cerebro example configuration. Copy to application.yaml and edit.
#
# Environment variables are expanded inside string values, for example
# "${APPLICATION_SECRET}". Direct overrides also exist for CEREBRO_PORT,
# APPLICATION_SECRET and AUTH_TYPE.

# A list of known hosts (Elasticsearch clusters). Each host can have its own auth
# and a whitelist of HTTP headers forwarded from the user's request to ES.
hosts:
  - name: "Local cluster"
    host: "http://localhost:9200"
    # auth:
    #   username: "elastic"
    #   password: "changeme"
    headers_whitelist: ["x-proxy-user", "x-proxy-roles", "X-Forwarded-For"]

# Application authentication. type: disabled | basic | ldap.
auth:
  # Set to "basic" or "ldap" before exposing Cerebro outside a trusted local network.
  type: "disabled"
  settings:
    # basic auth
    username: "${BASIC_AUTH_USER}"
    password: "${BASIC_AUTH_PWD}"
    # LDAP. Use ldaps:// in production. For private development-only ldap://
    # tests, set insecure_ldap: true.
    url: "${LDAP_URL}"
    # ca_cert_file: "/etc/cerebro/ldap-ca.pem"
    base_dn: "${LDAP_BASE_DN}"
    method: "${LDAP_METHOD}"
    user_template: "${LDAP_USER_TEMPLATE}"
    bind_dn: "${LDAP_BIND_DN}"
    bind_pw: "${LDAP_BIND_PWD}"
    # LDAP requires ldaps:// by default. Set this only for isolated development tests.
    insecure_ldap: false
    group_search:
      base_dn: "${LDAP_GROUP_BASE_DN}"
      user_attr: "${LDAP_USER_ATTR}"
      user_attr_template: "${LDAP_USER_ATTR_TEMPLATE}"
      group: "${LDAP_GROUP}"

server:
  port: 9000
  base_path: "/"
  # Required when auth.type is basic or ldap. Use a strong random value.
  secret: "${APPLICATION_SECRET}"
  # Keep true when served through HTTPS. Set false only for local HTTP dev.
  cookie_secure: true
  max_request_bytes: 5242880
  # HSTS is emitted only for HTTPS requests, including requests behind a proxy
  # that sets X-Forwarded-Proto: https.
  hsts_enabled: true
  hsts_max_age_seconds: 31536000
  hsts_include_subdomains: true

es:
  gzip: true
  # false means users can connect only to configured hosts.
  allow_ad_hoc_hosts: false
  max_response_bytes: 26214400
  # Optional TLS trust and mutual TLS for Elasticsearch.
  # ca_cert_file: "/etc/cerebro/es-ca.pem"
  # client_cert_file: "/etc/cerebro/es-client.pem"
  # client_key_file: "/etc/cerebro/es-client-key.pem"
  # Optional AWS SigV4 signing for Amazon OpenSearch Service.
  # aws:
  #   enabled: false
  #   region: "eu-central-1"
  #   service: "es" # use "aoss" for OpenSearch Serverless
  #   profile: ""
  #   access_key_id: "${AWS_ACCESS_KEY_ID}"
  #   secret_access_key: "${AWS_SECRET_ACCESS_KEY}"
  #   session_token: "${AWS_SESSION_TOKEN}"

rest:
  history_size: 50

features:
  # Read-only browser for documents inside an index. Disabled by default because
  # it exposes document contents to every authenticated Cerebro user.
  data_explorer: false

data:
  path: "./cerebro.db"
