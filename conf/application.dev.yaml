# Development config used by docker-compose.yaml.
# Do not copy this file to production: dev credentials may be set by docker compose,
# cookies are allowed over
# HTTP and the data explorer is enabled.

hosts:
  - name: "Local cluster"
    host: "http://elasticsearch:9200"

auth:
  type: "${AUTH_TYPE}"
  settings:
    username: "${BASIC_AUTH_USER}"
    password: "${BASIC_AUTH_PWD}"

server:
  port: 9000
  base_path: "/"
  secret: "dev-secret-change-me"
  cookie_secure: false
  csrf_enabled: false
  max_request_bytes: 5242880
  hsts_enabled: false

es:
  gzip: true
  # Keep disabled in development too; the configured local cluster is enough.
  allow_ad_hoc_hosts: false
  max_response_bytes: 26214400

rest:
  history_size: 50

features:
  # Enabled only for development so the index data explorer is visible locally.
  data_explorer: true

data:
  path: "/workspace/cerebro/cerebro.db"
