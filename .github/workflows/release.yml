name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  packages: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build and publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Download Go dependencies
        run: go mod download

      - name: Check Go modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Generate OpenAPI client
        run: npm run api:generate

      - name: Check generated API is committed
        run: git diff --exit-code -- openapi/cerebro.json src/api/client

      - name: Run frontend and API typechecks
        run: |
          npm run typecheck
          npm run api:typecheck

      - name: Run Go tests
        run: go test -race -shuffle=on ./cmd/... ./internal/...

      - name: Build frontend
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          VITE_APP_VERSION="${VERSION}" npm run build

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: docker-meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable=${{ !contains(github.ref_name, '-') }}
            type=raw,value=prerelease,enable=${{ contains(github.ref_name, '-') }}
            type=sha,format=short

      - name: Build and publish Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.docker-meta.outputs.tags }}
          labels: ${{ steps.docker-meta.outputs.labels }}

      - name: Build release binaries
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p dist
          build() {
            local goos="$1"
            local goarch="$2"
            local goarm="${3:-}"
            local ext=""
            if [ "${goos}" = "windows" ]; then
              ext=".exe"
            fi
            local arm_suffix=""
            if [ -n "${goarm}" ]; then
              arm_suffix="v${goarm}"
            fi
            local out="dist/cerebro-${GITHUB_REF_NAME}-${goos}-${goarch}${arm_suffix}${ext}"
            GOOS="${goos}" GOARCH="${goarch}" GOARM="${goarm}" CGO_ENABLED=0 go build -trimpath -ldflags="-s -w -X github.com/lmenezes/cerebro/internal/version.Version=${VERSION}" -o "${out}" ./cmd/cerebro
          }
          build linux amd64
          build linux arm64
          build linux arm 7
          build darwin amd64
          build darwin arm64
          build windows amd64
          build windows arm64
          sha256sum dist/cerebro-* > dist/checksums.txt

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          RELEASE_FLAGS=()
          if [[ "${GITHUB_REF_NAME}" == *-* ]]; then
            RELEASE_FLAGS+=(--prerelease)
          fi
          gh release create "${GITHUB_REF_NAME}" \
            dist/cerebro-* \
            dist/checksums.txt \
            --title "Cerebro ${GITHUB_REF_NAME}" \
            "${RELEASE_FLAGS[@]}" \
            --verify-tag
