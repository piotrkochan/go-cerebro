name: CI

on:
  push:
    branches:
      - main
      - master
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-build:
    name: Test and build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24.x
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Download Go dependencies
        run: go mod download

      - name: Check Go modules are tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Generate OpenAPI client
        run: npm run api:generate

      - name: Check generated API is committed
        run: git diff --exit-code -- openapi/cerebro.json src/api/client

      - name: Run frontend and API typechecks
        run: |
          npm run typecheck
          npm run api:typecheck

      - name: Run Go tests
        run: go test -race -shuffle=on -coverprofile=coverage.out ./cmd/... ./internal/...

      - name: Build frontend
        run: npm run build

      - name: Build Go binary
        run: go build -v ./cmd/cerebro

  elasticsearch-compatibility:
    name: Elasticsearch compatibility
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set up Go
        uses: actions/setup-go@v6
        with:
          go-version: "1.26.4"

      - name: Configure Elasticsearch host limits
        run: sudo sysctl -w vm.max_map_count=262144

      - name: Download Go dependencies
        run: go mod download

      - name: Run Elasticsearch compatibility tests
        run: bash scripts/e2e-elasticsearch-compat.sh
